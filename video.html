<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#FBF5E6;color:#1A1209;overflow-x:hidden}
:root{
  --espresso:#1A1209;--aubergine:#4A2C52;--marigold:#C8973A;

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{0%{opacity:0;transform:scale(.9)}60%{transform:scale(1.04)}100%{opacity:1;transform:scale(1)}}
@keyframes pulse{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-50%) scale(1.08)}}

/* NAV */
.nav{background:var(--aubergine);padding:18px 6%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;letter-spacing:-.03em;color:var(--marigold);text-decoration:none}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:#fff}

/* BREADCRUMB */
.breadcrumb{background:var(--cream);padding:14px 6%;border-bottom:1px solid rgba(26,18,9,.06)}
.breadcrumb-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.breadcrumb a,.breadcrumb span{font-size:12px;font-weight:600;letter-spacing:.04em;text-decoration:none;color:var(--tobacco)}
.breadcrumb a:hover{color:var(--marigold)}
.breadcrumb .sep{color:rgba(26,18,9,.2);font-size:10px}
.breadcrumb .current{color:var(--marigold);font-weight:700}

/* MEDIA HERO */
.media-hero{background:var(--aubergine);padding:48px 6% 56px;position:relative;overflow:hidden}
.media-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(200,151,58,.08) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.media-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 70% at 50% 60%,rgba(200,151,58,.1) 0%,transparent 70%);pointer-events:none}
.media-inner{position:relative;z-index:1;max-width:800px;margin:0 auto}

/* Video player area */
.player-wrap{position:relative;width:100%;aspect-ratio:16/9;border-radius:16px;overflow:hidden;cursor:pointer;background:#0E0A05;margin-bottom:24px;box-shadow:0 12px 48px rgba(0,0,0,.4)}
.player-cover{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,rgba(74,44,82,.6),rgba(26,18,9,.8));transition:opacity .4s}
.player-cover.hidden{opacity:0;pointer-events:none}
.cover-pattern{position:absolute;inset:0;background-image:radial-gradient(circle,rgba(200,151,58,.06) 1px,transparent 1px);background-size:20px 20px}
.cover-icon{font-size:64px;opacity:.15;position:absolute;top:24px;right:28px}
.play-btn{width:80px;height:80px;border-radius:50%;background:var(--marigold);display:flex;align-items:center;justify-content:center;position:relative;z-index:2;animation:pulse 2s ease-in-out infinite;box-shadow:0 4px 24px rgba(200,151,58,.4)}
.play-btn svg{width:32px;height:32px;color:var(--espresso);margin-left:4px}
.player-embed{position:absolute;inset:0;display:none}
.player-embed.active{display:block}
.player-embed iframe{width:100%;height:100%;border:none}
.player-embed .embed-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#0E0A05;color:rgba(255,255,255,.3);font-size:14px;font-weight:600;letter-spacing:.06em}

/* Metadata strip */
.meta-strip{display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center}
.meta-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.04em}
.meta-badge svg{width:14px;height:14px;opacity:.6}
.meta-badge.accent{background:rgba(200,151,58,.15);border-color:rgba(200,151,58,.3);color:var(--marigold)}

/* CONTENT */
.content{background:var(--cream);padding:56px 6%}
.content-inner{max-width:720px;margin:0 auto}
.content-eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--marigold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.content-eyebrow::after{content:'';flex:1;max-width:28px;height:2px;background:var(--marigold)}
.content h1{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(28px,4vw,44px);color:var(--espresso);line-height:1.15;margin-bottom:16px;animation:fadeUp .6s .1s both}
.content h1 em{color:var(--marigold);font-style:normal}
.content-body{font-size:16px;color:var(--tobacco);line-height:1.78;margin-bottom:24px}
.content-body p{margin-bottom:16px}
.content-body strong{color:var(--espresso)}

/* CTA row */
.cta-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:32px}
.cta-primary{display:inline-flex;align-items:center;gap:8px;background:var(--aubergine);color:var(--marigold);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;padding:16px 36px;border-radius:100px;text-decoration:none;letter-spacing:.04em;transition:background .2s;border:none;cursor:pointer}
.cta-primary:hover{background:var(--espresso)}
.cta-primary svg{width:18px;height:18px}
.cta-secondary{font-size:13px;font-weight:600;color:var(--tobacco);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:color .2s}
.cta-secondary:hover{color:var(--marigold)}

/* Tags */
.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-radius:100px;padding:5px 14px}
.tag-phase{color:var(--aubergine);background:rgba(74,44,82,.08);border:1px solid rgba(74,44,82,.2)}
.tag-type{color:var(--marigold);background:rgba(200,151,58,.1);border:1px solid rgba(200,151,58,.25)}

/* Day context */
.day-context{padding:24px;background:rgba(26,18,9,.03);border:1px solid rgba(26,18,9,.06);border-radius:14px;margin-bottom:0}
.day-context-title{font-size:13px;font-weight:700;color:var(--espresso);margin-bottom:4px}
.day-context-sub{font-size:13px;color:var(--tobacco);line-height:1.5}
.day-context a{color:var(--marigold);text-decoration:none;font-weight:700}
.day-context a:hover{text-decoration:underline}

/* UP NEXT */
.up-next{background:var(--espresso);padding:64px 6%}
.up-next-inner{max-width:960px;margin:0 auto}
.up-next .section-eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--marigold);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.up-next .section-eyebrow::after{content:'';flex:1;max-width:28px;height:2px;background:var(--marigold)}
.up-next .section-h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(24px,3vw,36px);color:#fff;line-height:1.15;margin-bottom:32px}
.up-next .section-h2 em{color:var(--marigold);font-style:normal}
.resource-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.resource-card{border-radius:14px;padding:24px 20px;border:1px solid;transition:transform .22s;position:relative;overflow:hidden;text-decoration:none;display:block}
.resource-card:hover{transform:translateY(-4px)}
.resource-card.style-1{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
.resource-card.style-2{background:rgba(200,151,58,.12);border-color:rgba(200,151,58,.3)}
.resource-card.style-3{background:rgba(74,44,82,.2);border-color:rgba(74,44,82,.45)}
.resource-card.style-4{background:rgba(200,151,58,.08);border-color:rgba(200,151,58,.2)}
.resource-card.style-5{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.resource-card.style-6{background:rgba(74,44,82,.15);border-color:rgba(74,44,82,.35)}
.rc-icon{font-size:28px;margin-bottom:12px;display:block;line-height:1}
.rc-type{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--marigold);margin-bottom:6px}
.rc-title{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:6px}
.rc-body{font-size:13px;color:rgba(255,255,255,.55);line-height:1.65;margin-bottom:12px}
.rc-cta{font-size:11px;font-weight:700;color:var(--marigold);text-decoration:none;letter-spacing:.04em;display:inline-flex;align-items:center;gap:4px}
.rc-cta::after{content:'→'}

/* FOOTER */
footer{background:var(--deep);padding:28px 6%;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.05)}
.footer-logo{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;letter-spacing:-.03em;color:var(--marigold);text-decoration:none}
footer p{font-size:11px;color:rgba(255,255,255,.2)}

/* RESPONSIVE */
@media(max-width:900px){.resource-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){
  .resource-grid{grid-template-columns:1fr}
  .nav-links{display:none}
  footer{flex-direction:column;gap:16px;text-align:center}
  .play-btn{width:64px;height:64px}
  .play-btn svg{width:24px;height:24px}
  .cta-row{flex-direction:column;align-items:stretch;text-align:center}
  .cta-secondary{justify-content:center}
}
</style>
</head>

  <div class="meta-badge accent">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="m15.91 11.672a.375.375 0 010 .656l-5.603 3.113a.375.375 0 01-.557-.328V8.887c0-.286.307-.466.557-.327l5.603 3.112z"/><path d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    ${duration}
  </div>
  <div class="meta-badge">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12"/></svg>
    Day ${dayNum} of 90
  </div>
  <div class="meta-badge">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    ${phase.name}
  </div>
`;

// ── CONTENT ──
document.getElementById('contentSection').innerHTML=`
  <div class="content-eyebrow">Video Lesson</div>
  <h1>${resource.title}</h1>
  <div class="content-body">
    <p>${resource.body}</p>
    <p><strong>What you'll learn:</strong> This video lesson is part of Day ${dayNum} — "${dayData.title}" in the ${phase.name} phase of your 90-day Spanish journey. ${dayData.subtitle}.</p>
    <p>Watch at your own pace, pause to practice, and revisit anytime. Each video is designed to build on what you've learned so you can see real progress every day.</p>
  </div>
  <div class="cta-row">
    <button class="cta-primary" onclick="revealEmbed()">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Watch the Video
    </button>
    <a href="/course#day-${dayNum}" class="cta-secondary">← Back to Day ${dayNum}</a>
  </div>
  <div class="tag-row">
    <span class="tag tag-phase">${phase.eyebrow}</span>
    <span class="tag tag-type">Video · ${duration}</span>
  </div>
  <div class="day-context">
    <div class="day-context-title">Part of Day ${dayNum}: ${dayData.title}</div>
    <div class="day-context-sub">${dayData.subtitle} · <a href="/course#day-${dayNum}">View all Day ${dayNum} resources</a></div>
  </div>
`;

// ── UP NEXT ──
const otherResources=dayData.resources
  .map((r,i)=>({...r,idx:i}))
  .filter((_,i)=>i!==resIdx);

// If we need more, pull from adjacent days
let upNext=[...otherResources];
if(upNext.length<3){
  const nextDay=courseData.find(d=>d.day===dayNum+1);
  if(nextDay) upNext.push(...nextDay.resources.map((r,i)=>({...r,idx:i,fromDay:nextDay.day})));
}
upNext=upNext.slice(0,3);

function getAssetLink(r,day){
  const d=r.fromDay||day;
  const i=r.idx;
  if(r.icon==='📺') return `/video?day=${d}&i=${i}`;
  if(r.icon==='🎧'||r.icon==='🎙️') return `/audio?day=${d}&i=${i}`;
  return `/download?day=${d}&i=${i}`;
}

document.getElementById('upNextGrid').innerHTML=upNext.map((r,i)=>`
  <a href="${getAssetLink(r,dayNum)}" class="resource-card ${cardStyles[i%cardStyles.length]}">
    <span class="rc-icon">${r.icon}</span>
    <div class="rc-type">${r.type}</div>
    <div class="rc-title">${r.title}</div>
    <div class="rc-body">${r.body}</div>
    <span class="rc-cta">${r.cta}</span>
  </a>
`).join('');

// ── EMBED REVEAL ──
function revealEmbed(){
  document.getElementById('playerCover').classList.add('hidden');
  const embed=document.getElementById('playerEmbed');
  embed.classList.add('active');
  // To add a real video, replace the placeholder div with:
  // embed.innerHTML='<iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>';
}
</script>
</body>
</html>

<style>
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:#FBF5E6;color:#1A1209;overflow-x:hidden}
:root{
  --espresso:#1A1209;--aubergine:#4A2C52;--marigold:#C8973A;
  --cream:#FBF5E6;--tobacco:#6B5B3E;--deep:#0E0A05;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

/* NAV */
.nav{background:var(--aubergine);padding:18px 6%;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;letter-spacing:-.03em;color:var(--marigold);text-decoration:none}
.nav-links{display:flex;align-items:center;gap:28px}
.nav-links a{font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.55);text-decoration:none;transition:color .2s}
.nav-links a:hover{color:#fff}

/* BREADCRUMB */
.breadcrumb{background:var(--cream);padding:14px 6%;border-bottom:1px solid rgba(26,18,9,.06)}
.breadcrumb-inner{max-width:960px;margin:0 auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.breadcrumb a,.breadcrumb span{font-size:12px;font-weight:600;letter-spacing:.04em;text-decoration:none;color:var(--tobacco)}
.breadcrumb a:hover{color:var(--marigold)}
.breadcrumb .sep{color:rgba(26,18,9,.2);font-size:10px}
.breadcrumb .current{color:var(--marigold);font-weight:700}

/* MEDIA HERO */
.media-hero{background:var(--aubergine);padding:56px 6% 64px;position:relative;overflow:hidden}
.media-hero::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,rgba(200,151,58,.08) 1px,transparent 1px);background-size:28px 28px;pointer-events:none}
.media-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 70% at 50% 60%,rgba(200,151,58,.1) 0%,transparent 70%);pointer-events:none}
.media-inner{position:relative;z-index:1;max-width:560px;margin:0 auto;text-align:center}

/* Document mockup */
.doc-wrap{position:relative;width:240px;margin:0 auto 28px;animation:float 4s ease-in-out infinite}
.doc-mockup{width:240px;height:320px;border-radius:12px;background:#fff;box-shadow:0 16px 56px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.1);position:relative;overflow:hidden}
.doc-header{background:var(--marigold);height:48px;display:flex;align-items:center;padding:0 20px}
.doc-header-dots{display:flex;gap:6px}
.doc-header-dots span{width:8px;height:8px;border-radius:50%;background:rgba(26,18,9,.2)}
.doc-header-title{flex:1;text-align:center;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--espresso)}
.doc-body{padding:24px 20px}
.doc-line{height:6px;border-radius:3px;margin-bottom:8px;background:rgba(26,18,9,.06)}
.doc-line:nth-child(1){width:80%}
.doc-line:nth-child(2){width:100%}
.doc-line:nth-child(3){width:65%}
.doc-line:nth-child(4){width:90%;margin-top:20px}
.doc-line:nth-child(5){width:100%}
.doc-line:nth-child(6){width:45%}
.doc-line:nth-child(7){width:75%;margin-top:20px}
.doc-line:nth-child(8){width:95%}
.doc-line:nth-child(9){width:55%}
.doc-badge{position:absolute;bottom:-12px;right:-12px;width:56px;height:56px;border-radius:50%;background:var(--marigold);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(200,151,58,.4)}
.doc-badge svg{width:24px;height:24px;color:var(--espresso)}
.doc-shadow{width:200px;height:16px;margin:20px auto 0;border-radius:50%;background:rgba(0,0,0,.15);filter:blur(8px)}

/* File type label */
.file-label{margin-top:16px;font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(255,255,255,.4)}

/* Metadata strip */
.meta-strip{display:flex;align-items:center;gap:16px;flex-wrap:wrap;justify-content:center;margin-top:24px}
.meta-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:6px 16px;font-size:12px;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.04em}
.meta-badge svg{width:14px;height:14px;opacity:.6}
.meta-badge.accent{background:rgba(200,151,58,.15);border-color:rgba(200,151,58,.3);color:var(--marigold)}

/* CONTENT */
.content{background:var(--cream);padding:56px 6%}
.content-inner{max-width:720px;margin:0 auto}
.content-eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--marigold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.content-eyebrow::after{content:'';flex:1;max-width:28px;height:2px;background:var(--marigold)}
.content h1{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(28px,4vw,44px);color:var(--espresso);line-height:1.15;margin-bottom:16px;animation:fadeUp .6s .1s both}
.content h1 em{color:var(--marigold);font-style:normal}
.content-body{font-size:16px;color:var(--tobacco);line-height:1.78;margin-bottom:24px}
.content-body p{margin-bottom:16px}
.content-body strong{color:var(--espresso)}

/* What's inside */
.whats-inside{background:rgba(26,18,9,.03);border:1px solid rgba(26,18,9,.06);border-radius:14px;padding:28px;margin-bottom:32px}
.whats-inside h3{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:var(--espresso);margin-bottom:16px}
.whats-inside ul{list-style:none;padding:0}
.whats-inside li{font-size:14px;color:var(--tobacco);line-height:1.65;padding:6px 0;padding-left:24px;position:relative}
.whats-inside li::before{content:'✓';position:absolute;left:0;color:var(--marigold);font-weight:700;font-size:13px}

.cta-row{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:32px}
.cta-primary{display:inline-flex;align-items:center;gap:8px;background:var(--aubergine);color:var(--marigold);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;padding:16px 36px;border-radius:100px;text-decoration:none;letter-spacing:.04em;transition:background .2s;border:none;cursor:pointer}
.cta-primary:hover{background:var(--espresso)}
.cta-primary svg{width:18px;height:18px}
.cta-secondary{font-size:13px;font-weight:600;color:var(--tobacco);text-decoration:none;display:inline-flex;align-items:center;gap:4px;transition:color .2s}
.cta-secondary:hover{color:var(--marigold)}
.tag-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px}
.tag{display:inline-block;font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-radius:100px;padding:5px 14px}
.tag-phase{color:var(--aubergine);background:rgba(74,44,82,.08);border:1px solid rgba(74,44,82,.2)}
.tag-type{color:var(--marigold);background:rgba(200,151,58,.1);border:1px solid rgba(200,151,58,.25)}
.day-context{padding:24px;background:rgba(26,18,9,.03);border:1px solid rgba(26,18,9,.06);border-radius:14px}
.day-context-title{font-size:13px;font-weight:700;color:var(--espresso);margin-bottom:4px}
.day-context-sub{font-size:13px;color:var(--tobacco);line-height:1.5}
.day-context a{color:var(--marigold);text-decoration:none;font-weight:700}
.day-context a:hover{text-decoration:underline}

/* UP NEXT */
.up-next{background:var(--espresso);padding:64px 6%}
.up-next-inner{max-width:960px;margin:0 auto}
.up-next .section-eyebrow{font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--marigold);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.up-next .section-eyebrow::after{content:'';flex:1;max-width:28px;height:2px;background:var(--marigold)}
.up-next .section-h2{font-family:'DM Serif Display',serif;font-style:italic;font-size:clamp(24px,3vw,36px);color:#fff;line-height:1.15;margin-bottom:32px}
.up-next .section-h2 em{color:var(--marigold);font-style:normal}
.resource-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.resource-card{border-radius:14px;padding:24px 20px;border:1px solid;transition:transform .22s;position:relative;overflow:hidden;text-decoration:none;display:block}
.resource-card:hover{transform:translateY(-4px)}
.resource-card.style-1{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.1)}
.resource-card.style-2{background:rgba(200,151,58,.12);border-color:rgba(200,151,58,.3)}
.resource-card.style-3{background:rgba(74,44,82,.2);border-color:rgba(74,44,82,.45)}
.resource-card.style-4{background:rgba(200,151,58,.08);border-color:rgba(200,151,58,.2)}
.resource-card.style-5{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.08)}
.resource-card.style-6{background:rgba(74,44,82,.15);border-color:rgba(74,44,82,.35)}
.rc-icon{font-size:28px;margin-bottom:12px;display:block;line-height:1}
.rc-type{font-size:9px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--marigold);margin-bottom:6px}
.rc-title{font-family:'DM Sans',sans-serif;font-size:15px;font-weight:700;color:#fff;line-height:1.25;margin-bottom:6px}
.rc-body{font-size:13px;color:rgba(255,255,255,.55);line-height:1.65;margin-bottom:12px}
.rc-cta{font-size:11px;font-weight:700;color:var(--marigold);text-decoration:none;letter-spacing:.04em;display:inline-flex;align-items:center;gap:4px}
.rc-cta::after{content:'→'}

footer{background:var(--deep);padding:28px 6%;display:flex;align-items:center;justify-content:space-between;border-top:1px solid rgba(255,255,255,.05)}
.footer-logo{font-family:'Unbounded',sans-serif;font-size:18px;font-weight:900;letter-spacing:-.03em;color:var(--marigold);text-decoration:none}
footer p{font-size:11px;color:rgba(255,255,255,.2)}

@media(max-width:900px){.resource-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){
  .resource-grid{grid-template-columns:1fr}
  .nav-links{display:none}
  footer{flex-direction:column;gap:16px;text-align:center}
  .doc-wrap{width:200px}.doc-mockup{width:200px;height:270px}
  .cta-row{flex-direction:column;align-items:stretch;text-align:center}
  .cta-secondary{justify-content:center}
}
</style>
</head>

  {num:3,name:"Mastery",eyebrow:"Phase 3 · Mastery"},
];
const cardStyles=['style-1','style-2','style-3','style-4','style-5','style-6'];

const params=new URLSearchParams(window.location.search);
const dayNum=parseInt(params.get('day'))||1;
const resIdx=parseInt(params.get('i'))||0;
const dayData=courseData.find(d=>d.day===dayNum);
if(!dayData){document.body.innerHTML='<p style="padding:80px;text-align:center">Day not found.</p>';throw new Error('invalid')}
const resource=dayData.resources[resIdx]||dayData.resources[0];
const phase=phases[dayData.phase-1];

// Determine asset subtype
const isWorksheet=resource.type.toLowerCase().includes('worksheet')||resource.icon==='✍️';
const isQuiz=resource.type.toLowerCase().includes('quiz')||resource.type.toLowerCase().includes('assessment');
const isArticle=resource.icon==='📖';
const isPractice=resource.icon==='💬';

let fileType='PDF';
let pageCount='6 pages';
let typeName='Downloadable Resource';

if(isWorksheet){fileType='Worksheet';pageCount='4 pages';typeName='Worksheet'}
else if(isQuiz){fileType='Quiz';pageCount='3 pages';typeName='Self-Assessment'}
else if(isArticle){fileType='Article';pageCount='3 min read';typeName='Quick Read'}
else if(isPractice){fileType='Interactive';pageCount='5 exercises';typeName='Practice Activity'}
else{
  const t=resource.type.toLowerCase();
  if(t.includes('download')){fileType='PDF Guide';pageCount='8 pages';typeName='Free Download'}
  else if(t.includes('read')){fileType='Article';const m=resource.type.match(/(\d+)\s*min/);pageCount=m?m[1]+' min read':'3 min read';typeName='Quick Read'}
}

document.title=`${resource.title} — Day ${dayNum} | The Jazmín Method`;
document.getElementById('docHeaderTitle').textContent=fileType;
document.getElementById('fileLabel').textContent=fileType+' Document';

document.getElementById('breadcrumb').innerHTML=`
  <a href="/course">${phase.eyebrow}</a><span class="sep">›</span>
  <a href="/course#day-${dayNum}">Day ${dayNum}</a><span class="sep">›</span>
  <span class="current">${typeName}</span>
`;

document.getElementById('metaStrip').innerHTML=`
  <div class="meta-badge accent">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m2.25 0H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 00-9-9z"/></svg>
    ${pageCount}
  </div>
  <div class="meta-badge">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25H12"/></svg>
    Day ${dayNum} of 90
  </div>
  <div class="meta-badge">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 6v6h4.5m4.5 0a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
    ${phase.name}
  </div>
  <div class="meta-badge">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/><path d="M6 6h.008v.008H6V6z"/></svg>
    ${fileType}
  </div>
`;

// Content section with "What's Inside"
const insideItems = isArticle
  ? ['Key concepts explained in plain language','Real-world examples you can use immediately','Cultural context to deepen understanding','Actionable takeaways for your next conversation']
  : isQuiz
  ? ['Multiple choice and fill-in-the-blank questions','Listening comprehension check','Vocabulary and grammar review','Score yourself and track progress']
  : isPractice
  ? ['Guided exercises with clear instructions','Speaking and writing prompts','Self-check answer key included','Progressive difficulty from warm-up to challenge']
  : ['Printable format — study offline anywhere','Clear, illustrated layout for easy learning','Key vocabulary highlighted and translated','Practice exercises with answer key'];

document.getElementById('contentSection').innerHTML=`
  <div class="content-eyebrow">${typeName}</div>
  <h1>${resource.title}</h1>
  <div class="content-body">
    <p>${resource.body}</p>
    <p><strong>About this resource:</strong> This ${typeName.toLowerCase()} is part of Day ${dayNum} — "${dayData.title}" in the ${phase.name} phase of your 90-day Spanish journey. ${dayData.subtitle}.</p>
    <p>Download it, print it out, or read it on your device. These resources are designed to complement your audio and video lessons, giving you hands-on practice that cements what you've learned.</p>
  </div>
  <div class="whats-inside">
    <h3>What's inside</h3>
    <ul>${insideItems.map(item=>`<li>${item}</li>`).join('')}</ul>
  </div>
  <div class="cta-row">
    <button class="cta-primary" onclick="handleDownload()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"/></svg>
      ${isArticle?'Read Now':isPractice?'Start Practice':'Download '+fileType}
    </button>
    <a href="/course#day-${dayNum}" class="cta-secondary">← Back to Day ${dayNum}</a>
  </div>
  <div class="tag-row">
    <span class="tag tag-phase">${phase.eyebrow}</span>
    <span class="tag tag-type">${fileType} · ${pageCount}</span>
  </div>
  <div class="day-context">
    <div class="day-context-title">Part of Day ${dayNum}: ${dayData.title}</div>
    <div class="day-context-sub">${dayData.subtitle} · <a href="/course#day-${dayNum}">View all Day ${dayNum} resources</a></div>
  </div>
`;

// Up next
const others=dayData.resources.map((r,i)=>({...r,idx:i})).filter((_,i)=>i!==resIdx);
let upNext=[...others];
if(upNext.length<3){const nd=courseData.find(d=>d.day===dayNum+1);if(nd)upNext.push(...nd.resources.map((r,i)=>({...r,idx:i,fromDay:nd.day})))}
upNext=upNext.slice(0,3);
function getAssetLink(r,day){const d=r.fromDay||day;if(r.icon==='📺')return`/video?day=${d}&i=${r.idx}`;if(r.icon==='🎧'||r.icon==='🎙️')return`/audio?day=${d}&i=${r.idx}`;return`/download?day=${d}&i=${r.idx}`}
document.getElementById('upNextGrid').innerHTML=upNext.map((r,i)=>`
  <a href="${getAssetLink(r,dayNum)}" class="resource-card ${cardStyles[i%cardStyles.length]}">
    <span class="rc-icon">${r.icon}</span>
    <div class="rc-type">${r.type}</div>
    <div class="rc-title">${r.title}</div>
    <div class="rc-body">${r.body}</div>
    <span class="rc-cta">${r.cta}</span>
  </a>
`).join('');

function handleDownload(){
  // Replace with actual download URL when ready
  alert('Download link will be added here — connect your file hosting URL.');
}
</script>
</body>
</html>
